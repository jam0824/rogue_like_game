<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sprite Sheet Slicer (Row + Seq)</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif; margin: 16px; }
    .wrap { max-width: 1100px; margin: 0 auto; display: grid; gap: 12px; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 960px) { .row { grid-template-columns: 1.2fr 0.8fr; } }
    .card { border: 1px solid rgba(127,127,127,.35); border-radius: 12px; padding: 12px; background: rgba(127,127,127,.06); }
    .drop {
      border: 2px dashed rgba(127,127,127,.45);
      border-radius: 12px; padding: 18px; text-align: center;
      transition: 120ms;
      user-select: none;
    }
    .drop.drag { border-color: rgba(80,160,255,.9); background: rgba(80,160,255,.12); }
    .controls { display: grid; gap: 10px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: grid; gap: 6px; font-size: 13px; }
    input, select, button, textarea {
      border-radius: 10px; border: 1px solid rgba(127,127,127,.35);
      padding: 10px 12px; font-size: 14px; background: rgba(127,127,127,.08);
    }
    textarea { resize: vertical; min-height: 44px; }
    button { cursor: pointer; background: rgba(80,160,255,.18); border-color: rgba(80,160,255,.35); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btnrow { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 520px) { .btnrow { grid-template-columns: 1fr 1fr; } }
    .hint { font-size: 12px; opacity: .8; line-height: 1.5; }
    .status { font-size: 13px; white-space: pre-wrap; line-height: 1.55; }
    canvas { width: 100%; height: auto; border-radius: 10px; border: 1px solid rgba(127,127,127,.25); background: rgba(0,0,0,.08); }
    .thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; }
    .thumb { border: 1px solid rgba(127,127,127,.25); border-radius: 10px; padding: 8px; background: rgba(127,127,127,.05); }
    .thumb img { width: 100%; height: auto; display: block; border-radius: 8px; background: rgba(0,0,0,.08); }
    .thumb .cap { font-size: 12px; opacity: .85; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .warn { color: #c24; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Sprite Sheet Slicer（行 + 行内連番）</h2>

    <div class="row">
      <div class="card">
        <div id="drop" class="drop">
          <div style="font-weight:600;">ここにスプライト画像をドラッグ＆ドロップ</div>
          <div class="hint">または <input id="file" type="file" accept="image/*" style="margin-top:8px;" /></div>
          <div id="zipHint" class="hint" style="margin-top:10px;"></div>
        </div>

        <div style="margin-top:12px;">
          <canvas id="preview"></canvas>
          <div class="hint" style="margin-top:8px;">
            ※ 表示は縮小されますが、グリッドは正確に計算されています。<br/>
            ※ 端数（画像サイズが割り切れない部分）は、設定で「端数も含める」にすると切り出します。
          </div>
        </div>
      </div>

      <div class="card controls">
        <div class="grid2">
          <label>セル幅 (width px)
            <input id="cellW" type="number" min="1" value="64" />
          </label>
          <label>セル高 (height px)
            <input id="cellH" type="number" min="1" value="64" />
          </label>
        </div>

        <div class="grid2">
          <label>オフセットX (px)
            <input id="offX" type="number" value="0" />
          </label>
          <label>オフセットY (px)
            <input id="offY" type="number" value="0" />
          </label>
        </div>

        <div class="grid2">
          <label>行名プレフィックス（行ラベル未指定時）
            <input id="rowPrefix" value="line" />
          </label>
          <label>行番号開始（例：1）
            <input id="rowStart" type="number" value="1" />
          </label>
        </div>

        <label>行ラベル（任意：1行目=idle 等）※カンマ or 改行区切り
          <textarea id="rowLabels" rows="3" placeholder="idle, run, jump"></textarea>
          <div class="hint">例：idle,run,jump と入れると idle_1 / run_1… のように保存されます。未入力の行は line{行番号} を使用。</div>
        </label>

        <div class="grid2">
          <label>フレーム番号開始（行内連番）
            <input id="frameStart" type="number" value="1" />
          </label>
          <label>ゼロ埋め桁数（例：1→1, 4→0001）
            <input id="pad" type="number" min="1" value="1" />
          </label>
        </div>

        <div class="grid2">
          <label>出力形式
            <select id="fmt">
              <option value="image/png" selected>PNG</option>
              <option value="image/webp">WebP</option>
            </select>
          </label>
          <label>WebP品質 (0〜1)
            <input id="q" type="number" step="0.05" min="0" max="1" value="0.92" />
          </label>
        </div>

        <div class="grid2">
          <label>端数も含める
            <select id="partial">
              <option value="0" selected>いいえ（割り切れる範囲のみ）</option>
              <option value="1">はい（はみ出しは透明で埋める）</option>
            </select>
          </label>
          <label>（ZIP時）フォルダ名
            <input id="zipFolder" placeholder="未入力なら自動" />
          </label>
        </div>

        <div class="btnrow">
          <button id="splitBtn" disabled>分割（プレビュー作成）</button>
          <button id="clearBtn" disabled>クリア</button>
        </div>

        <div class="btnrow">
          <button id="zipBtn" disabled>ZIPで一括保存</button>
          <button id="dlBtn" disabled>個別に保存（多数注意）</button>
        </div>

        <div id="status" class="status">画像を読み込んでください。</div>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:600; margin-bottom:8px;">分割結果（サムネイル）</div>
      <div id="thumbs" class="thumbs"></div>
    </div>
  </div>

  <!-- JSZip（ZIP出力用）: ネット接続があると使えます。 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>
    const $ = (id) => document.getElementById(id);

    const drop = $("drop");
    const fileInput = $("file");
    const preview = $("preview");
    const ctx = preview.getContext("2d");

    const cellW = $("cellW");
    const cellH = $("cellH");
    const offX = $("offX");
    const offY = $("offY");

    const rowPrefix = $("rowPrefix");
    const rowStart = $("rowStart");
    const rowLabels = $("rowLabels");

    const frameStart = $("frameStart");
    const pad = $("pad");

    const fmt = $("fmt");
    const q = $("q");
    const partial = $("partial");
    const zipFolder = $("zipFolder");

    const splitBtn = $("splitBtn");
    const zipBtn = $("zipBtn");
    const dlBtn = $("dlBtn");
    const clearBtn = $("clearBtn");
    const status = $("status");
    const thumbs = $("thumbs");
    const zipHint = $("zipHint");

    let img = null;
    let imgURL = null;
    let currentBaseName = "frames";

    /** 分割結果（blob + objectURL） */
    let frames = [];
    let frameURLs = [];

    function setStatus(text, isWarn = false) {
      status.textContent = text;
      status.classList.toggle("warn", !!isWarn);
    }

    function revokeFrames() {
      for (const u of frameURLs) URL.revokeObjectURL(u);
      frameURLs = [];
      frames = [];
      thumbs.innerHTML = "";
    }

    function revokeImage() {
      if (imgURL) URL.revokeObjectURL(imgURL);
      imgURL = null;
      img = null;
    }

    function isZipReady() {
      return typeof window.JSZip !== "undefined";
    }

    function updateZipHint() {
      zipHint.textContent = isZipReady()
        ? "ZIP保存：利用可能（JSZip読み込み済）"
        : "ZIP保存：利用不可（ネット無し等でJSZipが読み込めない場合）。個別保存は利用できます。";
    }

    function safeInt(el, fallback) {
      const v = Number(el.value);
      if (!Number.isFinite(v)) return fallback;
      return Math.trunc(v);
    }

    function parseRowLabels() {
      // カンマ or 改行区切り
      const raw = (rowLabels.value || "").trim();
      if (!raw) return [];
      return raw
        .split(/[\n,]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function getRowName(rowNumber) {
      // rowNumber: 表示上の行番号（rowStart基準、通常1始まり）
      const labels = parseRowLabels();
      const idx = rowNumber - safeInt(rowStart, 1); // 0-based
      if (idx >= 0 && idx < labels.length && labels[idx]) return labels[idx];
      const p = (rowPrefix.value.trim() || "line");
      // line + 1 => line1
      return `${p}${rowNumber}`;
    }

    function makeFileName(rowNumber, frameNumber) {
      const rowName = getRowName(rowNumber);
      const digits = Math.max(1, safeInt(pad, 1));
      const frameStr = String(frameNumber).padStart(digits, "0");

      const ext = (fmt.value === "image/webp") ? "webp" : "png";
      return `${rowName}_${frameStr}.${ext}`;
    }

    async function loadImageFile(file) {
      revokeFrames();
      revokeImage();

      if (!file || !file.type.startsWith("image/")) {
        setStatus("画像ファイルを選んでください。", true);
        return;
      }

      currentBaseName = (file.name || "frames").replace(/\.[^.]+$/, "") || "frames";

      imgURL = URL.createObjectURL(file);
      img = new Image();
      img.decoding = "async";

      img.onload = () => {
        preview.width = img.naturalWidth;
        preview.height = img.naturalHeight;

        renderPreview();

        splitBtn.disabled = false;
        clearBtn.disabled = false;

        setStatus(
          `読み込み完了: ${file.name}\n` +
          `画像サイズ: ${img.naturalWidth} x ${img.naturalHeight}\n` +
          `保存名例: ${makeFileName(safeInt(rowStart, 1), safeInt(frameStart, 1))}`
        );
      };

      img.onerror = () => {
        revokeImage();
        setStatus("画像の読み込みに失敗しました。", true);
      };

      img.src = imgURL;
    }

    function renderPreview() {
      if (!img) return;

      const w = img.naturalWidth;
      const h = img.naturalHeight;

      preview.width = w;
      preview.height = h;

      // 画像描画
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0);

      // グリッド
      const cw = Math.max(1, safeInt(cellW, 1));
      const ch = Math.max(1, safeInt(cellH, 1));
      const ox = safeInt(offX, 0);
      const oy = safeInt(offY, 0);

      ctx.save();
      ctx.globalAlpha = 0.8;
      ctx.lineWidth = 1;

      const color1 = "rgba(0,255,0,0.65)";
      const color2 = "rgba(0,0,0,0.25)";

      for (let x = ox; x <= w; x += cw) {
        ctx.strokeStyle = color2;
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, h);
        ctx.stroke();

        ctx.strokeStyle = color1;
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, h);
        ctx.stroke();
      }

      for (let y = oy; y <= h; y += ch) {
        ctx.strokeStyle = color2;
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(w, y + 0.5);
        ctx.stroke();

        ctx.strokeStyle = color1;
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(w, y + 0.5);
        ctx.stroke();
      }

      ctx.restore();
    }

    function canvasToBlob(canvas, mime, quality) {
      return new Promise((resolve) => {
        if (canvas.toBlob) {
          canvas.toBlob((b) => resolve(b), mime, quality);
        } else {
          const dataURL = canvas.toDataURL(mime, quality);
          const bin = atob(dataURL.split(",")[1]);
          const arr = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
          resolve(new Blob([arr], { type: mime }));
        }
      });
    }

    async function splitFrames() {
      if (!img) return;

      revokeFrames();

      const W = img.naturalWidth;
      const H = img.naturalHeight;

      const cw = Math.max(1, safeInt(cellW, 1));
      const ch = Math.max(1, safeInt(cellH, 1));
      const ox = safeInt(offX, 0);
      const oy = safeInt(offY, 0);
      const includePartial = partial.value === "1";

      const mime = fmt.value;
      const quality = Math.min(1, Math.max(0, Number(q.value || 0.92)));

      if (cw <= 0 || ch <= 0) {
        setStatus("セル幅/高さを正しく入力してください。", true);
        return;
      }
      if (ox >= W || oy >= H) {
        setStatus("オフセットが画像サイズを超えています。", true);
        return;
      }

      let cols, rows;
      if (includePartial) {
        cols = Math.ceil((W - ox) / cw);
        rows = Math.ceil((H - oy) / ch);
      } else {
        cols = Math.floor((W - ox) / cw);
        rows = Math.floor((H - oy) / ch);
      }

      if (cols <= 0 || rows <= 0) {
        setStatus("分割できるセルがありません（セルサイズやオフセットを確認）。", true);
        return;
      }

      const total = cols * rows;

      const rowStartN = safeInt(rowStart, 1);
      const frameStartN = safeInt(frameStart, 1);

      setStatus(
        `分割中...\n` +
        `cols=${cols}, rows=${rows}, total=${total}\n` +
        `命名: {行名}_{行内連番}.${mime === "image/webp" ? "webp" : "png"}\n` +
        `例: ${makeFileName(rowStartN, frameStartN)}`
      );

      const srcCanvas = document.createElement("canvas");
      srcCanvas.width = W;
      srcCanvas.height = H;
      const sctx = srcCanvas.getContext("2d");
      sctx.drawImage(img, 0, 0);

      for (let r = 0; r < rows; r++) {
        const rowNumber = rowStartN + r;
        for (let c = 0; c < cols; c++) {
          const frameNumber = frameStartN + c;

          const sx = ox + c * cw;
          const sy = oy + r * ch;

          const out = document.createElement("canvas");
          out.width = cw;
          out.height = ch;
          const octx = out.getContext("2d");

          const sw = Math.min(cw, Math.max(0, W - sx));
          const sh = Math.min(ch, Math.max(0, H - sy));
          if (sw > 0 && sh > 0) {
            octx.drawImage(srcCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
          }

          const blob = await canvasToBlob(out, mime, quality);
          const name = makeFileName(rowNumber, frameNumber);

          const url = URL.createObjectURL(blob);
          frameURLs.push(url);
          frames.push({ rowNumber, frameNumber, name, blob, url });

          const div = document.createElement("div");
          div.className = "thumb";
          const im = document.createElement("img");
          im.src = url;
          im.alt = name;
          const cap = document.createElement("div");
          cap.className = "cap";
          cap.textContent = name;
          div.appendChild(im);
          div.appendChild(cap);
          thumbs.appendChild(div);
        }
      }

      setStatus(
        `分割完了: ${total} 枚\n` +
        `命名例: ${frames[0]?.name || ""}\n` +
        `保存ボタンからダウンロードしてください。`
      );

      dlBtn.disabled = frames.length === 0;
      zipBtn.disabled = frames.length === 0 || !isZipReady();
    }

    function downloadBlob(blob, filename) {
      const a = document.createElement("a");
      const u = URL.createObjectURL(blob);
      a.href = u;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(u), 5000);
    }

    async function downloadIndividually() {
      if (!frames.length) return;

      setStatus(
        `個別保存を開始します（${frames.length} 件）\n` +
        `ブラウザによっては「複数ファイルのダウンロード許可」が必要です。`
      );

      for (let i = 0; i < frames.length; i++) {
        const f = frames[i];
        downloadBlob(f.blob, f.name);
        await new Promise(r => setTimeout(r, 80));
      }

      setStatus(`個別保存を実行しました（${frames.length} 件）。`);
    }

    async function downloadZip() {
      if (!frames.length) return;
      if (!isZipReady()) {
        setStatus("ZIP機能が利用できません（JSZip未読み込み）。", true);
        return;
      }

      const folderName = (zipFolder.value.trim() || `${currentBaseName}_sliced`);
      const zip = new JSZip();
      const dir = zip.folder(folderName);

      setStatus(`ZIP生成中...\n${frames.length} 件を追加しています。`);

      for (const f of frames) {
        dir.file(f.name, f.blob);
      }

      const zipBlob = await zip.generateAsync({ type: "blob" });
      downloadBlob(zipBlob, `${folderName}.zip`);
      setStatus(`ZIPを保存しました: ${folderName}.zip`);
    }

    // DnD
    drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("drag"); });
    drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
    drop.addEventListener("drop", (e) => {
      e.preventDefault();
      drop.classList.remove("drag");
      const f = e.dataTransfer.files?.[0];
      if (f) loadImageFile(f);
    });

    fileInput.addEventListener("change", (e) => {
      const f = e.target.files?.[0];
      if (f) loadImageFile(f);
    });

    // 入力変化でプレビュー更新（命名や設定変更もステータス反映したい場合は適宜）
    [cellW, cellH, offX, offY].forEach(el => el.addEventListener("input", renderPreview));
    [rowPrefix, rowStart, rowLabels, frameStart, pad].forEach(el => el.addEventListener("input", () => {
      if (img) setStatus(
        `設定更新\n` +
        `保存名例: ${makeFileName(safeInt(rowStart, 1), safeInt(frameStart, 1))}`
      );
    }));

    fmt.addEventListener("change", () => {
      renderPreview();
      zipBtn.disabled = frames.length === 0 || !isZipReady();
    });

    splitBtn.addEventListener("click", splitFrames);
    dlBtn.addEventListener("click", downloadIndividually);
    zipBtn.addEventListener("click", downloadZip);

    clearBtn.addEventListener("click", () => {
      revokeFrames();
      revokeImage();
      ctx.clearRect(0, 0, preview.width, preview.height);
      splitBtn.disabled = true;
      dlBtn.disabled = true;
      zipBtn.disabled = true;
      clearBtn.disabled = true;
      fileInput.value = "";
      setStatus("クリアしました。画像を読み込んでください。");
    });

    // 初期表示
    updateZipHint();
    setTimeout(updateZipHint, 600);
    setTimeout(() => { zipBtn.disabled = frames.length === 0 || !isZipReady(); updateZipHint(); }, 1600);
  </script>
</body>
</html>
